name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changelog:
    # Every pull request must touch CHANGELOG.md. Add the "skip-changelog"
    # label to a PR to bypass this when a change genuinely needs no entry.
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure CHANGELOG.md was updated
        run: |
          base="origin/${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref }}"
          if git diff --name-only "$base"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated."
          else
            echo "::error::CHANGELOG.md was not modified in this pull request."
            echo "Add an entry under '## [Unreleased]', or apply the 'skip-changelog' label if no entry is needed."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build
      - name: Configure test git identity
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
          git config --global init.defaultBranch main
      - run: bun test
