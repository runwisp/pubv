# SonarQube Cloud (Automatic Analysis) configuration.
#
# Test code is intentionally repetitive — table-driven cases and shared
# fixtures share the same shape on purpose — so the copy-paste detector flags
# it as duplication even though that repetition is not a maintainability defect.
# Exclude tests from duplication detection; they are still fully analysed for
# bugs, smells and security.
sonar.cpd.exclusions=tests/**
